<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FourFour 放肆 — Drum Machine</title>
  <link rel="stylesheet" href="style.css?v=56" />
</head>
<body>
  <main class="app">
    <section class="main-area">
      <header class="top-bar">
        <div class="brand">
          <h1>FourFour</h1>
          <span>beta</span>
        </div>
        <button id="playBtn" class="play-btn" aria-label="播放/暂停">
          <svg class="play-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg class="pause-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M6 5h4v14H6zm8 0h4v14h-4z" />
          </svg>
          <svg class="loading-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10" stroke-opacity="0.25" />
            <path d="M12 2a10 10 0 0 1 10 10" />
          </svg>
        </button>
        <button id="restartBtn" class="play-btn restart-btn" aria-label="从头播放">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
            <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" />
          </svg>
        </button>
        <button id="clearBtn" class="play-btn clear-btn" aria-label="清空">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
          </svg>
        </button>
        <div class="volume-control" id="volumeControl" aria-label="音量控制">
          <button class="volume-icon-btn" id="volumeIconBtn" aria-label="静音/取消静音">
            <svg class="volume-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <path class="volume-speaker" fill="currentColor" d="M11 5L6 9H2v6h4l5 4V5z" />
              <path class="vol-wave vol-wave-1" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M15.54 8.46a5 5 0 0 1 0 7.07" />
              <path class="vol-wave vol-wave-2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M17.78 6.22a8 8 0 0 1 0 11.56" />
              <path class="vol-wave vol-wave-3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M20 4a11 11 0 0 1 0 16" />
              <line class="volume-muted" x1="21" y1="3" x2="3" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
          <div class="vol-track master-vol-track" id="volumeSlider" role="slider" aria-label="主音量" aria-valuemin="0" aria-valuemax="100" aria-valuenow="80" tabindex="0">
            <div class="vol-bar">
              <div class="vol-fill"></div>
            </div>
            <div class="vol-thumb"></div>
          </div>
        </div>
        <div class="top-bpm" id="topBpm" aria-label="顶部 BPM 控制">
          <span class="bpm-blob"></span>
          <button class="step-btn" id="topBpmMinus" aria-label="减小 BPM">−</button>
          <input type="number" id="topBpmValue" class="bpm-value" value="110" min="40" max="220" aria-label="BPM">
          <button class="step-btn" id="topBpmPlus" aria-label="增大 BPM">+</button>
        </div>
        <div class="bank-tabs" id="bankTabs">
          <button class="bank-btn active" data-bank="0" aria-label="第 1 组 pad">A</button>
          <button class="bank-btn" data-bank="1" aria-label="第 2 组 pad">B</button>
          <button class="bank-btn" data-bank="2" aria-label="第 3 组 pad">C</button>
          <button class="bank-btn" data-bank="3" aria-label="第 4 组 pad">D</button>
        </div>
      </header>

      <div class="display-stage" id="displayStage">
        <div class="playhead-bar" id="playheadBar"></div>
        <div class="viz-grid" id="vizGrid"></div>
        <div class="motion-layer" id="motionLayer"></div>
      </div>

      <div class="sequencer-area" id="sequencerArea">
        <div class="sequencer" id="sequencer">
          <!-- 行由 JS 生成 -->
        </div>
        <div class="track-volumes" id="trackVolumes">
          <!-- 每轨音量由 JS 生成 -->
        </div>
      </div>

      <div class="beat-markers" id="beatMarkers">
      </div>
    </section>

    <aside class="settings" id="settingsPanel">
      <div class="settings-header">
        <h2>Settings</h2>
      </div>

      <div class="settings-inner">
        <div class="setting-row">
          <span>Lighting effects</span>
          <label class="toggle">
            <input type="checkbox" id="motionToggle" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="setting-section">
          <label class="section-label">BPM</label>
          <div class="bpm-control">
            <button class="step-btn" id="bpmMinus" aria-label="减小 BPM">−</button>
            <input type="number" id="bpmValue" class="bpm-value" value="110" min="40" max="220" aria-label="BPM">
            <button class="step-btn" id="bpmPlus" aria-label="增大 BPM">+</button>
          </div>
        </div>

        <div class="setting-section">
          <label class="section-label">Rhythm</label>
          <div class="chip-grid" id="rhythmChips">
            <button class="chip active">Rock</button>
            <button class="chip">Funk</button>
            <button class="chip">Techno</button>
          </div>
        </div>

        <div class="setting-section">
          <label class="section-label">Sample</label>
          <div class="chip-grid" id="sampleChips">
            <button class="chip active">Acoustic</button>
            <button class="chip">Vinyl</button>
            <button class="chip">808</button>
          </div>
        </div>

        <div class="setting-section smart-drums-section">
          <label class="section-label">Random</label>
          <div class="smart-drums">
            <div class="sd-controls">
              <button class="sd-power active" id="sdPower" aria-label="智能鼓机开关" title="开关">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <path d="M12 3v7" />
                  <path d="M5.6 7a7 7 0 1 0 12.8 0" />
                </svg>
              </button>
              <button class="sd-dice" id="sdDice" aria-label="随机生成" title="随机">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                  <rect x="3" y="3" width="18" height="18" rx="3" />
                  <circle cx="8" cy="8" r="1.8" fill="#1a1a1a" />
                  <circle cx="16" cy="8" r="1.8" fill="#1a1a1a" />
                  <circle cx="8" cy="16" r="1.8" fill="#1a1a1a" />
                  <circle cx="16" cy="16" r="1.8" fill="#1a1a1a" />
                </svg>
              </button>
            </div>
            <div class="sd-pad" id="sdPad">
              <span class="sd-label sd-top">响亮</span>
              <span class="sd-label sd-bottom">安静</span>
              <span class="sd-label sd-left">简单</span>
              <span class="sd-label sd-right">复杂</span>
              <div class="sd-axis sd-axis-x"></div>
              <div class="sd-axis sd-axis-y"></div>
            </div>
          </div>
        </div>
      </div>

    </aside>

    <button class="panel-toggle" id="panelToggle" aria-label="收起/展开设置">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 12h16M12 4l8 8-8 8" />
      </svg>
    </button>
</main>

  <script src="script.js?v=56"></script>
</body>
</html>
